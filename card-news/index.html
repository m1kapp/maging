<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script>!function(){var T=["flow","morningmate","claude","linear","stripe","airbnb","linkedin","apple","duolingo","github","spotify","netflix","figma","adobe","bloomberg","instagram","openai","vercel"],k="maging-theme",s=localStorage.getItem(k);if(!s||T.indexOf(s)<0)s="claude";document.documentElement.setAttribute("data-theme",s);localStorage.setItem(k,s)}();</script>
    <title>카드뉴스 데모 — AI 마케팅 트렌드 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="tw.css">
    <link rel="stylesheet" href="../dist/maging.css">
    <script defer src="../dist/maging-all.js" data-base="../dist/" data-no-tailwind></script>
    <script type="module" src="../components/site.js"></script>
    <script defer src="../dist/maging-news.js"></script>
  </head>
  <body class="mw-themed">
    <maging-nav active="demo"></maging-nav>

    <main style="display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 60px); padding:2rem 1rem;">
      <div id="cards-wrap" style="max-width:540px; width:100%;">
        <section class="news-card" id="card-cover" data-active></section>
        <section class="news-card" id="card-stat"></section>
        <section class="news-card" id="card-01"></section>
        <section class="news-card" id="card-02"></section>
        <section class="news-card" id="card-quote"></section>
        <section class="news-card" id="card-compare"></section>
        <section class="news-card" id="card-data"></section>
        <section class="news-card" id="card-step"></section>
        <section class="news-card" id="card-checklist"></section>
        <section class="news-card" id="card-review"></section>
        <section class="news-card" id="card-cta"></section>
      </div>
    </main>

    <news-nav></news-nav>

    <script>
    window.addEventListener('maging:ready', () => {
      const BRAND = '@maging.page';

      window.NEWS_MOUNT = {

        // 1. 커버 — number-hero 스타일 (리스티클)
        'card-cover': () => Maging.coverCard('#card-cover', {
          tag: 'AI 마케팅 가이드',
          title: 'AI 마케팅\n실전 도입법',
          subtitle: '지금 바로 적용할 수 있는 실무 가이드',
          brand: BRAND,
          style: 'number-hero',
          number: 5,
        }),

        // 2. 임팩트 수치 — statCard로 후킹
        'card-stat': () => Maging.statCard('#card-stat', {
          label: 'GLOBAL ADOPTION',
          value: '73<span class="mw-unit">%</span>',
          context: '글로벌 기업의 73%가 이미 AI 마케팅을 도입했습니다',
          brand: BRAND,
        }),

        // 3. 본문 — 스텝 시작
        'card-01': () => Maging.stepCard('#card-01', {
          step: '01',
          heading: '고객 세그먼트 분석',
          text: '기존 고객 데이터에서 행동 패턴을 추출하고 클러스터링합니다. AI가 수천 개의 변수를 분석해 최적 세그먼트를 찾아줍니다.',
          tip: '최소 3개월 이상의 데이터로 시작하세요',
          brand: BRAND,
        }),

        // 4. 스텝 계속
        'card-02': () => Maging.stepCard('#card-02', {
          step: '02',
          heading: '개인화 콘텐츠 자동 생성',
          text: '세그먼트별 맞춤 메시지를 AI가 실시간으로 생성합니다. 이메일, 푸시, 광고 카피까지 한 번에.',
          tip: 'A/B 테스트도 AI가 자동으로 최적화합니다',
          brand: BRAND,
        }),

        // 5. 리듬 변화 — 인용문으로 브레이크
        'card-quote': () => Maging.quoteCard('#card-quote', {
          quote: '마케팅의 미래는 AI가 만들고\n사람이 방향을 잡는 것이다.',
          name: '필립 코틀러',
          role: '마케팅의 아버지',
          brand: BRAND,
        }),

        // 6. 비교 카드 — Do/Don't
        'card-compare': () => Maging.comparisonCard('#card-compare', {
          heading: 'AI 마케팅 Do & Don\'t',
          leftLabel: 'Don\'t',
          rightLabel: 'Do',
          left: [
            '감에 의존한 타겟팅',
            '일괄 메시지 발송',
            '수동 A/B 테스트',
          ],
          right: [
            '데이터 기반 세그먼트',
            '개인화 콘텐츠',
            'AI 자동 최적화',
          ],
          brand: BRAND,
        }),

        // 7. 데이터 시각화
        'card-data': () => Maging.dataCard('#card-data', {
          label: 'ROI IMPACT',
          title: 'AI 마케팅 도입 효과',
          widget: 'barChart',
          widgetConfig: {
            items: [
              { label: '콘텐츠 생산성', value: 340 },
              { label: 'CAC 절감', value: 42 },
              { label: '전환율 상승', value: 28 },
              { label: 'LTV 증가', value: 35 },
            ],
            yFormatter: v => '+' + v + '%',
            showLabels: true,
          },
          brand: BRAND,
        }),

        // 8. 스텝 마무리
        'card-step': () => Maging.stepCard('#card-step', {
          step: '03',
          heading: '성과 측정 & 최적화',
          text: 'AI가 실시간으로 캠페인 성과를 분석하고, 예산 배분부터 메시지 튜닝까지 자동으로 최적화합니다.',
          tip: '주간 리뷰로 AI 추천 vs 실제 성과를 비교하세요',
          brand: BRAND,
        }),

        // 9. 체크리스트 — 저장 유도
        'card-checklist': () => Maging.checklistCard('#card-checklist', {
          heading: '도입 전 체크리스트 ✓',
          items: [
            { text: '고객 데이터 3개월 이상 확보', done: true },
            { text: '핵심 KPI 3개 이내로 설정', done: true },
            { text: 'AI 도구 비교·선정 완료', done: false },
            { text: '파일럿 캠페인 1개 설계', done: false },
            { text: '성과 측정 대시보드 구축', done: false },
          ],
          brand: BRAND,
        }),

        // 10. 고객 후기 — 소셜 프루프
        'card-review': () => Maging.testimonialCard('#card-review', {
          quote: '도입 3개월 만에 마케팅 비용 40% 절감, 전환율은 2배 상승했습니다.',
          name: '이수진',
          role: '마케팅 팀장, ABC Corp',
          stars: 5,
          brand: BRAND,
        }),

        // 11. CTA
        'card-cta': () => Maging.ctaCard('#card-cta', {
          heading: '우리 팀도\nAI 마케팅 시작하기',
          subtext: '팔로우하고 매주 실전 가이드를 받아보세요',
          ctas: [{ label: '팔로우하기', primary: true }],
          handles: [
            { platform: 'Instagram', handle: '@maging.page' },
            { platform: 'LinkedIn', handle: 'maging' },
          ],
          brand: BRAND,
        }),

      };
    });
    </script>
  </body>
</html>
