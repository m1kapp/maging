<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script>!function(){var T=["flow","morningmate","claude","linear","stripe","airbnb","linkedin","apple","duolingo","github","spotify","netflix","figma","adobe","bloomberg","instagram","openai","vercel","amazon"],k="maging-theme",s=localStorage.getItem(k);if(!s||T.indexOf(s)<0)s="amazon";document.documentElement.setAttribute("data-theme",s);localStorage.setItem(k,s)}();</script>
    <title>이커머스 마케팅 주간보고 — 2026년 4월 4주차</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="tw.css">
    <link rel="stylesheet" href="../dist/maging.css">
    <script defer src="../dist/maging-all.js" data-base="../dist/" data-no-tailwind></script>
    <script type="module" src="../components/site.js"></script>
    <script defer src="../dist/maging-weekly.js"></script>
  </head>
  <body class="mw-themed">
    <maging-nav active="demo"></maging-nav>
    <div class="flex">
    <weekly-sidebar active="cover" data-spa data-title="이커머스 마케팅 주간보고" data-date="2026.04.27 · 4월 4주차"></weekly-sidebar>
    <main class="flex-1 px-6 py-4" style="word-break: keep-all; min-width: 0">

      <!-- ── Code view panel ── -->
      <div id="code-view">
        <div id="cv-header">
          <span id="cv-title">// cover.js</span>
          <div style="display:flex;gap:8px">
            <button class="cv-btn" id="cv-copy">복사</button>
            <button class="cv-btn cv-btn--accent" id="cv-back">← 미리보기</button>
          </div>
        </div>
        <pre id="cv-pre"><code id="cv-code"></code></pre>
      </div>

      <div class="max-w-[1240px] mx-auto" id="slides-wrap">

        <!-- ═══ Slide 1: Cover ═══ -->
        <section class="slide cover-slide" id="cover" data-active>
          <div class="cover-host"></div>
        </section>

        <!-- ═══ Slide 2: 매출 KPI ═══ -->
        <section class="slide" id="revenue-kpi" data-label="GMV & 매출 현황" data-bu="마케팅본부" data-team="퍼포먼스 마케팅팀">
          <div class="rv-hero pb-1"></div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2">
            <div class="rv-kpi-1"></div><div class="rv-kpi-2"></div>
            <div class="rv-kpi-3"></div><div class="rv-kpi-4"></div>
          </div>
          <div class="mt-5 pt-4" style="border-top:1px solid var(--mw-border)">
            <div class="rv-sec-01"></div>
            <div class="rv-chart mt-3"></div>
          </div>
          <div class="mt-4"><div class="rv-review"></div></div>
        </section>

        <!-- ═══ Slide 3: 채널별 성과 ═══ -->
        <section class="slide" id="channel" data-label="채널별 매출 분석" data-bu="마케팅본부" data-team="퍼포먼스 마케팅팀">
          <div class="ch-hero pb-1"></div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2">
            <div class="ch-kpi-1"></div><div class="ch-kpi-2"></div>
            <div class="ch-kpi-3"></div><div class="ch-kpi-4"></div>
          </div>
          <div class="mt-5 pt-4" style="border-top:1px solid var(--mw-border)">
            <div class="ch-sec-01"></div>
            <div class="ch-table mt-3"></div>
          </div>
        </section>

        <!-- ═══ Slide 4: 캠페인 성과 ═══ -->
        <section class="slide" id="campaign" data-label="캠페인 성과" data-bu="마케팅본부" data-team="브랜드 마케팅팀">
          <div class="cp-hero pb-1"></div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-2">
            <div class="cp-kpi-1"></div><div class="cp-kpi-2"></div><div class="cp-kpi-3"></div>
          </div>
          <div class="mt-5 pt-4" style="border-top:1px solid var(--mw-border)">
            <div class="cp-sec-01"></div>
            <div class="cp-table mt-3"></div>
          </div>
          <div class="mt-4"><div class="cp-review"></div></div>
        </section>

        <!-- ═══ Slide 5: 고객 분석 ═══ -->
        <section class="slide" id="customer" data-label="고객 & 재구매 분석" data-bu="마케팅본부" data-team="CRM팀">
          <div class="cu-hero pb-1"></div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2">
            <div class="cu-kpi-1"></div><div class="cu-kpi-2"></div>
            <div class="cu-kpi-3"></div><div class="cu-kpi-4"></div>
          </div>
          <div class="mt-5 pt-4" style="border-top:1px solid var(--mw-border)">
            <div class="cu-sec-01"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mt-3">
              <div class="cu-donut"></div>
              <div class="cu-funnel"></div>
            </div>
          </div>
          <div class="mt-4"><div class="cu-review"></div></div>
        </section>

      </div><!-- /slides-wrap -->
    </main>
    </div>

    <!-- deck nav -->
    <a class="wrn wrn--prev" id="deck-prev" style="display:none" href="#" aria-label="이전 슬라이드">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <a class="wrn wrn--next" id="deck-next" style="display:none" href="#" aria-label="다음 슬라이드">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <div class="wrn-bar">
      <span class="wrn-bar__indicator" id="deck-ind">1 <span class="wrn-bar__sep">/</span> 5</span>
      <span class="wrn-bar__divider"></span>
      <button class="wrn-bar__btn" id="deck-code" type="button" title="코드보기 (C)" aria-label="코드보기">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </button>
      <button class="wrn-bar__btn" id="deck-fs" type="button" title="전체화면 (F)" aria-label="전체화면 토글">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 21 3 21 3 15"/><polyline points="15 3 21 3 21 9"/><line x1="3" y1="21" x2="10" y2="14"/><line x1="14" y1="10" x2="21" y2="3"/></svg>
      </button>
    </div>

    <script>
      window.addEventListener('maging:ready', () => {
        const { kpiCard, sectionCover, pageHeader, sectionHead, activityTable, barChart, lineChart, donutChart, funnelChart, insightCard } = Maging;
        const u = s => String(s).replace(/\[(.+?)\]/g, '<span class="mw-unit">$1</span>');
        const fmtW = v => Maging.fmt.krwPlain(v);

        function mountCover() {
          sectionCover(document.querySelector('#cover .cover-host'), {
            style: 'classic',
            kicker: 'WEEKLY REPORT · 2026년 4월 4주차',
            title: '이커머스 마케팅\n주간보고',
            subtitle: '마케팅본부 · 퍼포먼스 마케팅팀 · 브랜드 마케팅팀 · CRM팀',
            brand: 'ACME STORE',
            meta: '기준일 2026.04.27(월)',
          });
        }

        // ═══ Slide 2: 매출 KPI ═══
        function mountRevenueKpi() {
          const root = document.getElementById('revenue-kpi');
          pageHeader(root.querySelector('.rv-hero'), {
            kicker: '01 · REVENUE', title: 'GMV & 매출 현황',
          });
          kpiCard(root.querySelector('.rv-kpi-1'), { label: '주간 GMV', value: u('18.4[억원]'), delta: 12.3, sparkline: [14.2,15.1,15.8,16.4,17.1,18.4] });
          kpiCard(root.querySelector('.rv-kpi-2'), { label: '주문 건수', value: u('4,281[건]'), delta: 8.7, sparkline: [3420,3580,3710,3890,4050,4281] });
          kpiCard(root.querySelector('.rv-kpi-3'), { label: '객단가', value: u('42,900[원]'), delta: 3.2, sparkline: [38500,39200,40100,41300,41800,42900] });
          kpiCard(root.querySelector('.rv-kpi-4'), { label: 'ROAS', value: u('340[%]'), delta: 15, sparkline: [280,290,310,315,328,340] });
          sectionHead(root.querySelector('.rv-sec-01'), { index: '01', title: '주간 GMV 추이 (최근 8주)' });
          barChart(root.querySelector('.rv-chart'), {
            items: [
              { label: '3/2주', value: 1280000000 },
              { label: '3/3주', value: 1420000000 },
              { label: '3/4주', value: 1510000000 },
              { label: '4/1주', value: 1580000000 },
              { label: '4/2주', value: 1640000000 },
              { label: '4/3주', value: 1710000000 },
              { label: '4/4주', value: 1840000000 },
            ],
            yFormatter: v => (v / 100000000).toFixed(1) + '억',
            showLabels: true,
          });
          insightCard(root.querySelector('.rv-review'), {
            status: 'green', title: '주간 리뷰',
            bullets: [
              '봄 시즌 프로모션 효과로 GMV 전주 대비 7.6% 상승',
              '객단가 상승은 프리미엄 라인 확대 전략 효과',
              '다음 주 5월 가정의 달 캠페인 본격 집행 예정',
            ],
          });
        }

        // ═══ Slide 3: 채널별 성과 ═══
        function mountChannel() {
          const root = document.getElementById('channel');
          pageHeader(root.querySelector('.ch-hero'), {
            kicker: '02 · CHANNEL', title: '채널별 매출 분석',
          });
          kpiCard(root.querySelector('.ch-kpi-1'), { label: '자사몰', value: u('8.2[억원]'), delta: 15.2 });
          kpiCard(root.querySelector('.ch-kpi-2'), { label: '네이버', value: u('5.1[억원]'), delta: 8.4 });
          kpiCard(root.querySelector('.ch-kpi-3'), { label: '쿠팡', value: u('3.8[억원]'), delta: 11.1 });
          kpiCard(root.querySelector('.ch-kpi-4'), { label: '기타 채널', value: u('1.3[억원]'), delta: -2.8 });
          sectionHead(root.querySelector('.ch-sec-01'), { index: '01', title: '채널별 주요 지표 상세' });
          activityTable(root.querySelector('.ch-table'), {
            columns: [
              { key: 'channel', label: '채널', align: 'left' },
              { key: 'gmv', label: 'GMV', align: 'right', render: (v) => fmtW(v) },
              { key: 'orders', label: '주문수', align: 'right', render: (v) => v ? v.toLocaleString() + '건' : '-' },
              { key: 'aov', label: '객단가', align: 'right', render: (v) => v ? v.toLocaleString() + '원' : '-' },
              { key: 'roas', label: 'ROAS', align: 'right', render: (v) => v ? v + '%' : '-' },
              { key: 'delta', label: '전주비', align: 'right', render: (v) => {
                if (v == null) return '-';
                const sign = v > 0 ? '+' : '';
                const color = v > 0 ? 'var(--mw-success)' : 'var(--mw-danger)';
                return '<span style="color:' + color + ';font-weight:500">' + sign + v + '%</span>';
              }},
            ],
            rows: [
              { channel: '자사몰 (D2C)', gmv: 820000000, orders: 1580, aov: 51900, roas: 420, delta: 15.2 },
              { channel: '네이버 스마트스토어', gmv: 510000000, orders: 1280, aov: 39800, roas: 310, delta: 8.4 },
              { channel: '쿠팡 로켓그로스', gmv: 380000000, orders: 1020, aov: 37300, roas: 280, delta: 11.1 },
              { channel: '카카오 선물하기', gmv: 80000000, orders: 241, aov: 33200, roas: 190, delta: -5.2 },
              { channel: 'SSG / 11번가', gmv: 50000000, orders: 160, aov: 31300, roas: 150, delta: -8.1 },
            ],
          });
        }

        // ═══ Slide 4: 캠페인 성과 ═══
        function mountCampaign() {
          const root = document.getElementById('campaign');
          pageHeader(root.querySelector('.cp-hero'), {
            kicker: '03 · CAMPAIGN', title: '캠페인 성과',
          });
          kpiCard(root.querySelector('.cp-kpi-1'), { label: '총 광고비', value: u('5,400[만원]'), delta: 3.2 });
          kpiCard(root.querySelector('.cp-kpi-2'), { label: '전환수', value: u('1,842[건]'), delta: 18.5 });
          kpiCard(root.querySelector('.cp-kpi-3'), { label: 'CPA', value: u('29,300[원]'), delta: -12.8, deltaGoodWhen: 'negative' });
          sectionHead(root.querySelector('.cp-sec-01'), { index: '01', title: '캠페인별 상세 성과' });
          activityTable(root.querySelector('.cp-table'), {
            columns: [
              { key: 'name', label: '캠페인', align: 'left' },
              { key: 'spend', label: '광고비', align: 'right', render: (v) => v ? (v/10000).toLocaleString() + '만원' : '-' },
              { key: 'impressions', label: '노출', align: 'right', render: (v) => v ? (v/10000).toFixed(0) + '만' : '-' },
              { key: 'clicks', label: '클릭', align: 'right', render: (v) => v ? v.toLocaleString() : '-' },
              { key: 'ctr', label: 'CTR', align: 'right', render: (v) => v ? v + '%' : '-' },
              { key: 'conv', label: '전환', align: 'right', render: (v) => v ? v.toLocaleString() + '건' : '-' },
              { key: 'roas', label: 'ROAS', align: 'right', render: (v) => {
                if (v == null) return '-';
                const color = v >= 300 ? 'var(--mw-success)' : v >= 200 ? 'var(--mw-warning)' : 'var(--mw-danger)';
                return '<span style="color:' + color + ';font-weight:500">' + v + '%</span>';
              }},
            ],
            rows: [
              { name: '봄 시즌 기획전', spend: 18000000, impressions: 4200000, clicks: 84000, ctr: 2.0, conv: 672, roas: 480 },
              { name: 'Meta 리타겟팅', spend: 12000000, impressions: 2800000, clicks: 56000, ctr: 2.0, conv: 504, roas: 380 },
              { name: '네이버 브랜드검색', spend: 8000000, impressions: 1500000, clicks: 45000, ctr: 3.0, conv: 360, roas: 340 },
              { name: '카카오 비즈보드', spend: 6000000, impressions: 1800000, clicks: 25200, ctr: 1.4, conv: 176, roas: 210 },
              { name: '유튜브 브랜딩', spend: 10000000, impressions: 3200000, clicks: 32000, ctr: 1.0, conv: 130, roas: 160 },
            ],
          });
          insightCard(root.querySelector('.cp-review'), {
            status: 'yellow', title: '캠페인 리뷰',
            bullets: [
              'Meta 리타겟팅 ROAS 380% — 핵심 수익 채널로 유지',
              '유튜브 브랜딩 ROAS 160% — 브랜드 인지도 기여이나 효율 개선 필요',
              '5월 캠페인: 가정의 달 기획전 + 인플루언서 콜라보 준비 중',
            ],
          });
        }

        // ═══ Slide 5: 고객 분석 ═══
        function mountCustomer() {
          const root = document.getElementById('customer');
          pageHeader(root.querySelector('.cu-hero'), {
            kicker: '04 · CUSTOMER', title: '고객 & 재구매 분석',
          });
          kpiCard(root.querySelector('.cu-kpi-1'), { label: '신규 고객', value: u('1,240[명]'), delta: 14.2, sparkline: [820,910,980,1050,1120,1240] });
          kpiCard(root.querySelector('.cu-kpi-2'), { label: '재구매율', value: u('38.4[%]'), delta: 2.1, sparkline: [32.1,33.5,34.8,36.0,37.2,38.4] });
          kpiCard(root.querySelector('.cu-kpi-3'), { label: 'LTV (6개월)', value: u('127,000[원]'), delta: 8.3, sparkline: [98000,104000,110000,115000,121000,127000] });
          kpiCard(root.querySelector('.cu-kpi-4'), { label: '이탈률', value: u('4.2[%]'), delta: -1.8, deltaGoodWhen: 'negative', sparkline: [6.8,6.2,5.5,5.1,4.8,4.2] });
          sectionHead(root.querySelector('.cu-sec-01'), { index: '01', title: '고객 세그먼트 & 전환 퍼널' });
          donutChart(root.querySelector('.cu-donut'), {
            title: '고객 등급 분포',
            slices: [
              { label: 'VIP (5회+)', value: 12 },
              { label: '단골 (3~4회)', value: 18 },
              { label: '재구매 (2회)', value: 22 },
              { label: '신규 (1회)', value: 48 },
            ],
            centerLabel: '전체',
          });
          funnelChart(root.querySelector('.cu-funnel'), {
            title: '구매 전환 퍼널',
            stages: [
              { label: '사이트 방문', value: 128000 },
              { label: '상품 조회', value: 64000 },
              { label: '장바구니', value: 12800 },
              { label: '결제 시작', value: 6400 },
              { label: '구매 완료', value: 4281 },
            ],
          });
          insightCard(root.querySelector('.cu-review'), {
            status: 'green', title: '고객 분석 리뷰',
            bullets: [
              '재구매율 38.4%로 전분기 대비 6.3%p 상승 — CRM 자동화 효과',
              'VIP 고객 객단가 일반 대비 3.2배, 충성 프로그램 확대 검토',
              '장바구니→결제 전환율 50% — 간편결제 도입 후 개선세',
            ],
          });
        }

        window.DECK_MOUNT = {
          cover:        mountCover,
          'revenue-kpi': mountRevenueKpi,
          channel:      mountChannel,
          campaign:     mountCampaign,
          customer:     mountCustomer,
        };
      });
    </script>
  </body>
</html>
