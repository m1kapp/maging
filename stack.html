<!DOCTYPE html>
<html lang="ko" data-theme="claude">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stack — maging의 재료들</title>
<meta name="description" content="maging 라이브러리를 만드는 데 쓰인 모든 것 — 폰트, 라이브러리, 아이콘, CDN, 35개 브랜드 영감, 빌드 도구.">
<script src="./dist/maging-all.js"></script>
<style>
  body { background: var(--mw-bg); color: var(--mw-text); min-height: 100vh; }

  /* Nav */
  .stack-nav {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--mw-surface) 88%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid color-mix(in srgb, var(--mw-border) 70%, transparent);
  }
  .stack-nav__inner {
    max-width: 1080px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 1.5rem; gap: 1rem; flex-wrap: wrap;
  }
  .stack-nav a { text-decoration: none; color: inherit; }
  .stack-nav__brand { display: inline-flex; align-items: center; gap: 0.5rem; transition: opacity 120ms; }
  .stack-nav__brand:hover { opacity: 0.8; }
  .stack-nav__mark {
    width: 22px; height: 22px; background: var(--mw-accent); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; border-radius: calc(var(--mw-radius) * 0.7); font-size: 0.72rem;
  }
  [data-theme="vercel"] .stack-nav__mark, [data-theme="spotify"] .stack-nav__mark,
  [data-theme="slack"] .stack-nav__mark, [data-theme="amazon"] .stack-nav__mark,
  [data-theme="mailchimp"] .stack-nav__mark, [data-theme="ups"] .stack-nav__mark,
  [data-theme="deere"] .stack-nav__mark { color: #000; }
  .stack-nav__name { font-size: 0.95rem; font-weight: 600; }
  .stack-nav__page {
    color: var(--mw-text-muted); font-size: 0.78rem; font-family: var(--mw-mono-font);
    padding-left: 0.5rem; margin-left: 0.5rem; border-left: 1px solid var(--mw-border);
  }
  .stack-nav__links { display: flex; gap: 0.25rem; }
  .stack-nav__link {
    padding: 0.4rem 0.625rem; font-size: 0.78rem; color: var(--mw-text-muted);
    border-radius: calc(var(--mw-radius) * 0.6); transition: color 120ms, background 120ms;
  }
  .stack-nav__link:hover { color: var(--mw-text); background: var(--mw-surface-2); }

  /* Section dividers */
  .stack-section { padding-top: 2.5rem; margin-top: 2.5rem; border-top: 1px solid var(--mw-border); }

  /* Theme grid (custom — interactive) */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.5rem; margin-top: 1.25rem;
  }
  .theme-item {
    display: flex; align-items: center; gap: 0.625rem;
    padding: 0.625rem 0.875rem;
    background: var(--mw-surface); border: 1px solid var(--mw-border);
    border-radius: calc(var(--mw-radius) * 0.7);
    cursor: pointer; user-select: none;
    transition: border-color 140ms, transform 140ms, box-shadow 140ms;
  }
  .theme-item:hover { transform: translateY(-1px); box-shadow: 0 3px 10px -4px rgba(0,0,0,0.12); }
  .theme-item.is-active { border-width: 2px; }
  .theme-item__swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .theme-item__name { font-size: 0.78rem; font-weight: 500; }
  .theme-note {
    margin-top: 0.75rem; font-size: 0.75rem;
    color: var(--mw-text-muted); font-family: var(--mw-mono-font);
  }

  /* Footer */
  .stack-footer {
    margin-top: 3rem; padding: 2rem 0 3rem;
    border-top: 1px solid var(--mw-border);
    text-align: center; color: var(--mw-text-muted); font-size: 0.78rem;
  }
  .stack-footer a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
  .stack-footer a:hover { color: var(--mw-text); }
</style>
</head>
<body class="mw-themed">

<nav class="stack-nav">
  <div class="stack-nav__inner">
    <a href="./index.html" class="stack-nav__brand">
      <span class="stack-nav__mark">✦</span>
      <span class="stack-nav__name">maging</span>
      <span class="stack-nav__page">/ stack</span>
    </a>
    <div class="stack-nav__links">
      <a href="./index.html" class="stack-nav__link">Home</a>
      <a href="./demo.html" class="stack-nav__link">Demo</a>
      <a href="./llms.txt" class="stack-nav__link">llms.txt</a>
      <a href="https://github.com/m1kapp/maging" target="_blank" rel="noopener" class="stack-nav__link">GitHub</a>
    </div>
  </div>
</nav>

<div id="global-alert"></div>

<main class="max-w-[1080px] mx-auto px-6">

  <div id="page-hero" class="pt-14 pb-2"></div>

  <!-- Stats -->
  <div class="grid grid-cols-3 md:grid-cols-6 gap-3 mt-6" style="grid-auto-rows:110px">
    <div id="s-fonts"></div>
    <div id="s-libs"></div>
    <div id="s-widgets"></div>
    <div id="s-themes"></div>
    <div id="s-cdn"></div>
    <div id="s-oss"></div>
  </div>

  <!-- 01 · Fonts -->
  <div class="stack-section">
    <div id="section-01"></div>
    <div class="grid grid-cols-1 gap-3 mt-4" style="grid-auto-rows:360px">
      <div id="font-table"></div>
    </div>
  </div>

  <!-- 02 · Libraries -->
  <div class="stack-section">
    <div id="section-02"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mt-4" style="grid-auto-rows:210px">
      <div id="lib-echarts"></div>
      <div id="lib-tailwind"></div>
    </div>
  </div>

  <!-- 03 · Assets & CDN -->
  <div class="stack-section">
    <div id="section-03"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mt-4" style="grid-auto-rows:210px">
      <div id="icons-grid"></div>
      <div id="dist-grid"></div>
    </div>
  </div>

  <!-- 04 · Theme inspirations (custom interactive) -->
  <div class="stack-section">
    <div id="section-04"></div>
    <p style="margin-top:0.875rem;font-size:0.82rem;color:var(--mw-text-muted);line-height:1.65;max-width:640px;">
      각 테마는 해당 브랜드의 공개 팔레트·타이포·radius를 영감 삼아 재구성한 것입니다. 브랜드 자산·로고는 사용하지 않습니다. 클릭하면 이 페이지가 해당 테마로 전환됩니다.
    </p>
    <div class="theme-grid" id="theme-grid"></div>
    <div class="theme-note" id="theme-note">현재 테마: claude</div>
  </div>

  <!-- 05 · Widget Catalog -->
  <div class="stack-section">
    <div id="section-05"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mt-4" style="grid-auto-rows:300px">
      <div id="widget-goals"></div>
      <div id="widget-timeline"></div>
    </div>
  </div>

  <!-- 06 · Build & Dev tools -->
  <div class="stack-section">
    <div id="section-06"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mt-4" style="grid-auto-rows:260px">
      <div id="release-pipeline"></div>
      <div id="build-grid"></div>
    </div>
  </div>

  <!-- 07 · Release History -->
  <div class="stack-section">
    <div id="section-07"></div>
    <div class="grid grid-cols-1 gap-3 mt-4" style="grid-auto-rows:320px">
      <div id="version-history"></div>
    </div>
  </div>

  <footer class="stack-footer">
    <div>모든 출처를 명시했습니다 · 의문 있으면 <a href="https://github.com/m1kapp/maging/issues" target="_blank" rel="noopener">GitHub Issue</a>로</div>
    <div style="margin-top:0.5rem;"><a href="./index.html">← Home</a></div>
  </footer>

</main>

<script>
window.addEventListener('maging:ready', function () {

  Maging.alertBanner('#global-alert', {
    type: 'success',
    title: 'v0.1.10 stable',
    message: '35 brand themes · 31 widgets · 6 fonts · zero build step · CDN one-tag',
    dismissable: true,
  });

  Maging.pageHeader('#page-hero', {
    kicker: 'THE STACK',
    title: 'maging의 재료들',
    subtitle: '이 라이브러리를 가능하게 한 모든 것 — 무료 폰트, 오픈소스 라이브러리, 공개 CDN, 영감을 준 35개 브랜드, 검증 도구. 모두 출처와 라이선스를 밝힙니다.',
  });

  Maging.kpiCard('#s-fonts',   { label: 'Fonts',         value: '6',    compact: true });
  Maging.kpiCard('#s-libs',    { label: 'Libraries',     value: '2',    compact: true });
  Maging.kpiCard('#s-widgets', { label: 'Widgets',       value: '31',   compact: true });
  Maging.kpiCard('#s-themes',  { label: 'Brand Themes',  value: '35',   compact: true });
  Maging.kpiCard('#s-cdn',     { label: 'CDN Providers', value: '2',    compact: true });
  Maging.kpiCard('#s-oss',     { label: 'Open Source',   value: '100%', compact: true });

  Maging.sectionHead('#section-01', { index:'01', kicker:'FONTS',      title:'Fonts',              tag:'6종 · SIL OFL · 상업 사용 가능' });
  Maging.sectionHead('#section-02', { index:'02', kicker:'LIBRARIES',  title:'Libraries',          tag:'2종 · Apache 2.0 · MIT' });
  Maging.sectionHead('#section-03', { index:'03', kicker:'ASSETS',     title:'Assets & CDN',       tag:'CC0 · Free CDN' });
  Maging.sectionHead('#section-04', { index:'04', kicker:'THEMES',     title:'Theme inspirations', tag:'35개 브랜드 · inspired by' });
  Maging.sectionHead('#section-05', { index:'05', kicker:'WIDGETS',    title:'Widget Catalog',     tag:'31종 · 테마 연동 · ECharts 기반' });
  Maging.sectionHead('#section-06', { index:'06', kicker:'BUILD',      title:'Build & Dev tools',  tag:'개발 검증용 · 사용자 미노출' });
  Maging.sectionHead('#section-07', { index:'07', kicker:'CHANGELOG',  title:'Release History',    tag:'recent · GitHub' });

  Maging.activityTable('#font-table', {
    title: '폰트 구성',
    subtitle: '모두 SIL OFL — 상업 사용 가능',
    columns: [
      { key: 'name',    label: '폰트' },
      { key: 'role',    label: '역할 및 사용처' },
      { key: 'by',      label: '제작' },
      { key: 'license', label: '라이선스', align: 'right' },
    ],
    rows: [
      { name: 'Pretendard Variable', role: '한글 본문 · maging 기본 한글 폰트. maging.css @import 자동 내장',     by: 'Kil Hyung-jin',     license: 'SIL OFL' },
      { name: 'Inter',               role: '영문 본문 · 거의 모든 테마의 sans 1순위',                              by: 'Rasmus Andersson',  license: 'SIL OFL' },
      { name: 'JetBrains Mono',      role: '코드 · 수치 · 메타 텍스트. 합자 풍부. 토큰 수, 버전, 타임스탬프',     by: 'JetBrains',         license: 'SIL OFL' },
      { name: 'Playfair Display',    role: '디스플레이 세리프 · Claude · Tiffany · Hermes 테마 헤딩',              by: 'Claus Eggers',      license: 'SIL OFL' },
      { name: 'Hahmlet',             role: '한글 세리프 · 강조 테마의 display-font 폴백. Playfair와 짝',           by: 'JAMO',              license: 'SIL OFL' },
      { name: 'Tossface',            role: '컬러 이모지 · 모든 테마 font-stack 내장. 위젯 아이콘 일관 렌더링',     by: 'Toss',              license: 'SIL OFL' },
    ],
  });

  Maging.metricStack('#lib-echarts', {
    title: 'Apache ECharts 5',
    main: { label: '차트 위젯 종류', value: '13종' },
    items: [
      { label: '라이선스',   value: 'Apache 2.0' },
      { label: '번들 크기',  value: '~336 KB gz' },
      { label: '관리 주체',  value: 'Apache Foundation' },
    ],
  });

  Maging.metricStack('#lib-tailwind', {
    title: 'Tailwind CSS Play CDN',
    main: { label: '레이아웃 엔진', value: 'JIT' },
    items: [
      { label: '라이선스',   value: 'MIT' },
      { label: '빌드 필요',  value: '없음' },
      { label: '방식',       value: '브라우저 JIT' },
    ],
  });

  Maging.statusGrid('#icons-grid', {
    title: 'Icons & Assets',
    subtitle: '아이콘 · 이모지',
    columns: 1,
    items: [
      { label: 'Simple Icons',    status: 'ok', value: 'CC0 1.0' },
      { label: 'OS 시스템 이모지', status: 'ok', value: '의존성 0' },
    ],
  });

  Maging.statusGrid('#dist-grid', {
    title: 'Distribution',
    subtitle: 'CDN · 소스 호스팅',
    columns: 1,
    items: [
      { label: 'jsDelivr', status: 'ok', value: '글로벌 엣지' },
      { label: 'GitHub',   status: 'ok', value: 'Free' },
    ],
  });

  Maging.statusGrid('#build-grid', {
    title: 'Build & Dev Tools',
    subtitle: '프롬프트 토큰 실측 · 호스팅 옵션',
    columns: 3,
    items: [
      { label: 'gpt-tokenizer',          status: 'ok', value: 'MIT' },
      { label: '@anthropic-ai/tokenizer', status: 'ok', value: 'MIT' },
      { label: 'Vercel / Cloudflare',    status: 'ok', value: 'Free tier' },
    ],
  });

  Maging.goalGrid('#widget-goals', {
    title: '위젯 카탈로그',
    subtitle: '31종 전부 테마 연동 · zero dependencies',
    items: [
      { label: '차트 위젯',       value: 10, max: 10 },
      { label: '메트릭 카드',     value: 7,  max: 7  },
      { label: '테이블 & 피드',   value: 5,  max: 5  },
      { label: '분석 & 시각화',   value: 9,  max: 9  },
    ],
  });

  Maging.sparklineList('#widget-timeline', {
    title: '주요 위젯',
    subtitle: 'delta = 이번 릴리스 추가',
    items: [
      { label: 'Chart 10종',         value: '10', delta: 0,  sparkline: [4,6,8,9,10,10,10] },
      { label: 'Metric Card 7종',    value: '7',  delta: 0,  sparkline: [2,3,5,6,7,7,7]   },
      { label: 'Table & Feed 5종',   value: '5',  delta: 0,  sparkline: [1,2,3,4,5,5,5]   },
      { label: 'Analysis 9종',       value: '9',  delta: 1,  sparkline: [3,4,5,6,7,8,9]   },
      { label: 'Brand Themes',       value: '35', delta: 0,  sparkline: [10,20,28,32,35,35,35] },
      { label: 'Fonts',              value: '6',  delta: 0,  sparkline: [2,3,4,5,6,6,6]   },
    ],
  });

  Maging.progressStepper('#release-pipeline', {
    title: '릴리스 파이프라인',
    subtitle: 'v0.1.10 · main → CDN',
    steps: [
      { label: '소스 작성',     status: 'done',    date: 'maging.js + maging.css' },
      { label: '번들 빌드',     status: 'done',    date: 'maging-all.js 통합' },
      { label: 'GitHub Push',   status: 'done',    date: 'main branch' },
      { label: 'jsDelivr CDN',  status: 'done',    date: '글로벌 엣지 자동 배포' },
      { label: 'Vercel 호스팅', status: 'active',  date: '데모 · 스택 · 문서 서빙' },
    ],
  });

  Maging.timeline('#version-history', {
    title: '릴리스 노트',
    subtitle: '최근 변경 이력 · GitHub',
    items: [
      { time: 'v0.1.10', text: '테마 Picker FAB — CDN carry, 픽스 적용',          type: 'success' },
      { time: 'v0.1.9',  text: 'Theme FAB 라이브러리 내장 · 페이지 무관 auto-mount', type: 'info'    },
      { time: 'v0.1.8',  text: 'KPI 카드 하단 여백 수정 · Tossface 이모지 통합',    type: 'info'    },
      { time: 'v0.1.4',  text: '테마 Picker 정렬 탭 · 랜덤 초기화 · 핀 선택',      type: 'info'    },
      { time: 'v0.1.2',  text: 'one-tag 부트스트랩 · Pretendard 번들 · 단어 롤러',  type: 'info'    },
      { time: 'v0.1.1',  text: 'AI Output Formatter 피벗 — 대시보드 위젯 라이브러리 전환', type: 'warning' },
    ],
  });

  var THEMES = [
    { v:'claude',    name:'Claude',     accent:'#da7756' },
    { v:'linear',    name:'Linear',     accent:'#5e6ad2' },
    { v:'notion',    name:'Notion',     accent:'#37352f' },
    { v:'stripe',    name:'Stripe',     accent:'#635bff' },
    { v:'vercel',    name:'Vercel',     accent:'#000000' },
    { v:'github',    name:'GitHub',     accent:'#58a6ff' },
    { v:'apple',     name:'Apple',      accent:'#007aff' },
    { v:'linkedin',  name:'LinkedIn',   accent:'#0a66c2' },
    { v:'x',         name:'X',          accent:'#1d9bf0' },
    { v:'openai',    name:'OpenAI',     accent:'#00a67e' },
    { v:'discord',   name:'Discord',    accent:'#5865f2' },
    { v:'figma',     name:'Figma',      accent:'#ff3737' },
    { v:'amazon',    name:'Amazon',     accent:'#ff9900' },
    { v:'airbnb',    name:'Airbnb',     accent:'#ff5a5f' },
    { v:'adobe',     name:'Adobe',      accent:'#fa0c00' },
    { v:'youtube',   name:'YouTube',    accent:'#ff0000' },
    { v:'netflix',   name:'Netflix',    accent:'#e50914' },
    { v:'reddit',    name:'Reddit',     accent:'#ff4500' },
    { v:'twitch',    name:'Twitch',     accent:'#9146ff' },
    { v:'duolingo',  name:'Duolingo',   accent:'#58cc02' },
    { v:'spotify',   name:'Spotify',    accent:'#1db954' },
    { v:'slack',     name:'Slack',      accent:'#ecb22e' },
    { v:'tmobile',   name:'T-Mobile',   accent:'#e20074' },
    { v:'mailchimp', name:'Mailchimp',  accent:'#ffe01b' },
    { v:'fedex',     name:'FedEx',      accent:'#ff6600' },
    { v:'instagram', name:'Instagram',  accent:'#e1306c' },
    { v:'bloomberg', name:'Bloomberg',  accent:'#ffa028' },
    { v:'medium',    name:'Medium',     accent:'#1a8917' },
    { v:'tiffany',   name:'Tiffany',    accent:'#0abab5' },
    { v:'hermes',    name:'Hermès',     accent:'#ff6900' },
    { v:'nasa',      name:'NASA',       accent:'#fc3d21' },
    { v:'heineken',  name:'Heineken',   accent:'#e10012' },
    { v:'deere',     name:'John Deere', accent:'#ffde00' },
    { v:'ups',       name:'UPS',        accent:'#ffb500' },
    { v:'barbie',    name:'Barbie',     accent:'#e0218a' },
  ];

  var currentTheme = document.documentElement.getAttribute('data-theme') || 'claude';
  var note = document.getElementById('theme-note');

  function applyTheme(v, accent) {
    currentTheme = v;
    document.documentElement.setAttribute('data-theme', v);
    if (note) note.textContent = '현재 테마: ' + v;
    document.querySelectorAll('.theme-item').forEach(function (el) {
      var active = el.dataset.theme === v;
      el.classList.toggle('is-active', active);
      el.style.borderColor = active ? el.dataset.accent : '';
      el.style.color       = active ? el.dataset.accent : '';
    });
  }

  var container = document.getElementById('theme-grid');
  container.innerHTML = THEMES.map(function (t) {
    var active = t.v === currentTheme;
    return '<button class="theme-item' + (active ? ' is-active' : '') + '" ' +
      'data-theme="' + t.v + '" data-accent="' + t.accent + '" ' +
      'style="' + (active ? 'border-color:' + t.accent + ';color:' + t.accent + ';border-width:2px;' : '') + '">' +
      '<span class="theme-item__swatch" style="background:' + t.accent + '"></span>' +
      '<span class="theme-item__name">' + t.name + '</span>' +
      '</button>';
  }).join('');

  container.addEventListener('click', function (e) {
    var btn = e.target.closest('.theme-item');
    if (btn) applyTheme(btn.dataset.theme, btn.dataset.accent);
  });
});
</script>

</body>
</html>
